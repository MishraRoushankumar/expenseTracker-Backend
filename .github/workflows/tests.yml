name: Tests

on:
  push:
    branches:
      - develop
      - main

  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine

        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: expense_app
          POSTGRES_PASSWORD: password

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U expense_app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PORT: 5000
      NODE_ENV: test

      JWT_SECRET: RcxFjQaAGy8XxNJ8TvQOT2CoFuvuA1tD

      DATABASE_URL: postgresql://expense_app:password@localhost:5432/expense_tracker_test_db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create test database
        run: |
          PGPASSWORD=password createdb \
            -h localhost \
            -U expense_app \
            expense_tracker_test_db || true

      - name: Verify database connection
        run: |
          psql "$DATABASE_URL" -c "SELECT version();"

      - name: Create test migration
        run: npm run db:migrate

      - name: Push Drizzle schema
        run: npm run db:push

      - name: Run unit tests
        run: npm run test:run

      - name: Run integration tests
        run: npm run test:integration

      - name: Generate coverage
        run: npm run coverage
