name: Tests

on:
  push:
    branches:
      - develop
      - main

  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine

        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: expense_app
          POSTGRES_PASSWORD: Expense@123

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U expense_app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PORT: 5000
      NODE_ENV: test

      JWT_SECRET: RcxFjQaAGy8XxNJ8TvQOT2CoFuvuA1tD

      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: expense_tracker_test_db
      DB_USER: expense_app
      DB_PASSWORD: Expense@123

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create test database
        run: |
          PGPASSWORD=$DB_PASSWORD createdb \
            -h $DB_HOST \
            -p $DB_PORT \
            -U $DB_USER \
            $DB_NAME

      - name: Initialize database schema
        run: |
          PGPASSWORD=$DB_PASSWORD psql \
            -h $DB_HOST \
            -p $DB_PORT \
            -U $DB_USER \
            -d $DB_NAME \
            -f src/db/schema/init.sql

      - name: Run unit tests
        run: npm run test:run

      - name: Run integration tests
        run: npm run test:integration

      - name: Generate coverage
        run: npm run coverage
