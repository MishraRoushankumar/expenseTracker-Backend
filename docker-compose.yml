version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: expense-tracker-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME:-expense_tracker_db}
      POSTGRES_USER: ${DB_USER:-expense_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}

    ports:
      - "${DB_PORT:-5432}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-expense_app} -d ${DB_NAME:-expense_tracker_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: expense-tracker-api

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "${PORT:-5000}:${PORT:-5000}"

    environment:
      NODE_ENV: development

      PORT: ${PORT:-5000}

      DATABASE_URL: postgresql://${DB_USER:-expense_app}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-expense_tracker_db}

      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}

      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}

    command: npm start

volumes:
  postgres_data:
